database:
  path: "data/aigc_detection.db"

detection:
  mode: "api_first"
  threshold: 0.5
  deep_provenance_threshold: 0.6
  demo_provider_enabled: false
  api_providers:
    hive:
      enabled: true
      api_version: "v3_vlm"
      api_key_env: "LJ9NfOyoJrxKgomS9kfvPQ=="
    sightengine:
      enabled: true
      api_user_env: "1813021110"
      api_secret_env: "YzYcSfvs93dSk7Quie7DgWpuvToZBmWJ"
  local_models:
    enabled: true
    text_yuchuan:
      enabled: true
      cache_dir: "models/huggingface"
      device: "auto"
      threshold: 0.5
      short_text_chars: 200
      max_length: 512
      mixed_strategy: "max"
      models:
        zh_long: "yuchuantian/AIGC_detector_zhv3"
        zh_short: "yuchuantian/AIGC_detector_zhv3short"
        en_long: "yuchuantian/AIGC_detector_env3"
        en_short: "yuchuantian/AIGC_detector_env3short"
  text:
    model_name: "distilgpt2"
    threshold: 0.5
  image:
    model_name: "efficientnet_v2_s"
    threshold: 0.5
  audio:
    model_name: "yamnet"
    sample_rate: 16000
    threshold: 0.5
  video:
    frame_interval: 30
    threshold: 0.5
  fusion:
    method: "weighted_average"
    weights:
      text: 0.3
      image: 0.3
      audio: 0.2
      video: 0.2

provenance:
  fingerprint_db_path: "data/fingerprint_registry.db"
  c2pa:
    enabled: true
    mode: "local"
    tool_path: "tools/c2patool/c2patool.exe"
  watermark:
    enabled: true
    provider: "meta_seal"
    mode: "local"
    device: "auto"
    threshold: 0.5
    audio:
      enabled: true
      model: "audioseal_detector_16bits"
      cache_dir: "models/audioseal"
      sample_rate: 16000
      threshold: 0.5
    image:
      enabled: true
      provider: "videoseal"
      package_root: "third_party/videoseal"
      model: "videoseal"
      threshold: 0.5
    video:
      enabled: true
      provider: "videoseal"
      package_root: "third_party/videoseal"
      model: "videoseal"
      threshold: 0.5
      max_frames: 32
    text:
      enabled: false
      provider: "textseal"
      command: null

report:
  provider: "llm"
  llm_provider: "deepseek"
  api_key_env: "sk-3eb562cbc6ed4e5188c699b5f4735d4a"
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-flash"
api:
  host: "0.0.0.0"
  port: 8000

dashboard:
  port: 8501
