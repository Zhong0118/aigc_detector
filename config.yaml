database:
  path: "data/aigc_detection.db"

detection:
  text:
    model_name: "distilgpt2"
    threshold: 0.5
  image:
    model_name: "efficientnet_v2_s"
    threshold: 0.5
  audio:
    model_name: "yamnet"
    sample_rate: 16000
    threshold: 0.5
  video:
    frame_interval: 30
    threshold: 0.5
  fusion:
    method: "weighted_average"
    weights:
      text: 0.3
      image: 0.3
      audio: 0.2
      video: 0.2

provenance:
  fingerprint_db_path: "data/fingerprint_registry.db"

api:
  host: "0.0.0.0"
  port: 8000

dashboard:
  port: 8501
